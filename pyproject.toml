[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "edge-mining-framework"
version = "0.1.0"
description = "YAML-driven signal evaluation framework with fee-aware EV screening for algorithmic trading."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"

dependencies = [
    "pyyaml>=6.0",
    "numpy>=1.26.0",
    "pandas>=2.0.0"
]
